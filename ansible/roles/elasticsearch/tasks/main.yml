---
- name: Install Elasticsearch
  ansible.builtin.apt:
    name: elasticsearch
    state: present

- name: Grant elasticsearch group read access to TLS directory
  ansible.builtin.file:
    path: "{{ elastic_tls_dir }}"
    group: elasticsearch
    mode: '0750'

- name: Grant elasticsearch group read access to TLS files
  ansible.builtin.file:
    path: "{{ item }}"
    group: elasticsearch
    mode: '0640'
  loop:
    - "{{ elastic_tls_dir }}/key.pem"
    - "{{ elastic_tls_dir }}/cert.pem"
    - "{{ elastic_tls_dir }}/ca_chain.pem"

- name: Check whether data volume is formatted
  ansible.builtin.command:
    cmd: blkid /dev/xvdf
  register: blkid_result
  failed_when: false
  changed_when: false

- name: Format data volume as XFS
  ansible.builtin.command:
    cmd: mkfs.xfs /dev/xvdf
  when: blkid_result.rc != 0

- name: Create Elasticsearch data directory
  ansible.builtin.file:
    path: "{{ elasticsearch_data_dir }}"
    state: directory
    owner: elasticsearch
    group: elasticsearch
    mode: '0750'

- name: Mount data volume
  ansible.posix.mount:
    path: "{{ elasticsearch_data_dir }}"
    src: /dev/xvdf
    fstype: xfs
    opts: defaults,noatime
    state: mounted

- name: Set data directory ownership after mount
  ansible.builtin.file:
    path: "{{ elasticsearch_data_dir }}"
    owner: elasticsearch
    group: elasticsearch
    recurse: true

- name: Configure Elasticsearch
  ansible.builtin.template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    owner: root
    group: elasticsearch
    mode: '0640'
  notify: restart elasticsearch

- name: Configure JVM heap
  ansible.builtin.template:
    src: jvm.options.j2
    dest: /etc/elasticsearch/jvm.options.d/heap.options
    owner: root
    group: elasticsearch
    mode: '0640'
  notify: restart elasticsearch

- name: Enable and start Elasticsearch
  ansible.builtin.systemd:
    name: elasticsearch
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for Elasticsearch to be available
  ansible.builtin.uri:
    url: "https://localhost:9200/_cluster/health"
    method: GET
    user: elastic
    password: "changeme"
    validate_certs: false
    status_code: [200, 401]
  register: es_health
  until: es_health.status in [200, 401]
  retries: 30
  delay: 10

- name: Reset elastic superuser password
  ansible.builtin.command:
    cmd: /usr/share/elasticsearch/bin/elasticsearch-reset-password -u elastic -a -b -s
  register: elastic_password_result
  no_log: true
  changed_when: true

- name: Store elastic password in SSM
  ansible.builtin.shell:
    cmd: >
      aws ssm put-parameter
      --name "{{ elastic_ssm_prefix }}/credentials/elastic_password"
      --value "{{ elastic_password_result.stdout | trim }}"
      --type SecureString
      --overwrite
      --region "{{ aws_region }}"
  no_log: true
  changed_when: true

- name: Reset kibana_system user password
  ansible.builtin.command:
    cmd: /usr/share/elasticsearch/bin/elasticsearch-reset-password -u kibana_system -a -b -s
  register: kibana_system_password_result
  no_log: true
  changed_when: true

- name: Store kibana_system password in SSM
  ansible.builtin.shell:
    cmd: >
      aws ssm put-parameter
      --name "{{ elastic_ssm_prefix }}/credentials/kibana_system_password"
      --value "{{ kibana_system_password_result.stdout | trim }}"
      --type SecureString
      --overwrite
      --region "{{ aws_region }}"
  no_log: true
  changed_when: true

- name: Apply single-node index template (zero replicas)
  ansible.builtin.uri:
    url: "https://localhost:9200/_index_template/single-node-defaults"
    method: PUT
    user: elastic
    password: "{{ elastic_password_result.stdout | trim }}"
    validate_certs: false
    body_format: json
    body:
      index_patterns: ["*"]
      priority: 1
      template:
        settings:
          number_of_replicas: 0
    status_code: 200
  no_log: true
