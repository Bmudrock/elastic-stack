---
- name: Install Kibana
  ansible.builtin.apt:
    name: kibana
    state: present

- name: Grant kibana group read access to TLS directory
  ansible.builtin.file:
    path: "{{ elastic_tls_dir }}"
    group: kibana
    mode: '0750'

- name: Grant kibana group read access to TLS files
  ansible.builtin.file:
    path: "{{ item }}"
    group: kibana
    mode: '0640'
  loop:
    - "{{ elastic_tls_dir }}/key.pem"
    - "{{ elastic_tls_dir }}/cert.pem"
    - "{{ elastic_tls_dir }}/ca_chain.pem"

- name: Fetch kibana_system password from SSM
  ansible.builtin.shell:
    cmd: >
      aws ssm get-parameter
      --name "{{ elastic_ssm_prefix }}/credentials/kibana_system_password"
      --with-decryption
      --region "{{ aws_region }}"
      --query 'Parameter.Value'
      --output text
  register: kibana_system_password_raw
  changed_when: false
  no_log: true

- name: Check if Kibana keystore exists
  ansible.builtin.stat:
    path: /etc/kibana/kibana.keystore
  register: kibana_keystore_stat

- name: Create Kibana keystore
  ansible.builtin.command:
    cmd: /usr/share/kibana/bin/kibana-keystore create
  when: not kibana_keystore_stat.stat.exists

- name: Set kibana_system password in Kibana keystore
  ansible.builtin.shell:
    cmd: >
      echo "{{ kibana_system_password_raw.stdout | trim }}"
      | /usr/share/kibana/bin/kibana-keystore add elasticsearch.password --stdin --force
  no_log: true
  changed_when: true

- name: Configure Kibana
  ansible.builtin.template:
    src: kibana.yml.j2
    dest: /etc/kibana/kibana.yml
    owner: root
    group: kibana
    mode: '0640'
  notify: restart kibana

- name: Enable and start Kibana
  ansible.builtin.systemd:
    name: kibana
    state: started
    enabled: true
    daemon_reload: true

- name: Wait for Kibana to be available
  ansible.builtin.uri:
    url: "https://localhost:{{ kibana_port }}/api/status"
    method: GET
    validate_certs: false
    status_code: [200, 401, 302]
  register: kibana_status
  until: kibana_status.status in [200, 401, 302]
  retries: 30
  delay: 15
