---
# Shared defaults. Deployment-specific values (domain_name, aws_region,
# elastic_ssm_prefix, elastic_version, heap, enable_* flags, FQDNs) are supplied
# by the Terraform-generated inventory and override these.
elastic_tls_dir: /etc/elastic/tls
elastic_ssm_prefix: /elastic

# Pin to the current stable Elastic release. The apt channel is derived from the
# major version (e.g. 8.17.0 -> 8.x).
elastic_version: "8.17.0"
elastic_apt_channel: "{{ elastic_version.split('.')[0] }}.x"
elastic_apt_key_url: "https://artifacts.elastic.co/GPG-KEY-elasticsearch"

# Ports referenced across multiple roles.
fleet_server_port: 8220
apm_server_port: 8200
